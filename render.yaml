# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy by connecting your GitHub repo to Render and pointing it at this file.

services:
  - type: web
    name: acclimation-sports-management-api
    runtime: docker
    # Dockerfile is inside the backend subfolder
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free                  # change to "starter" or higher for production
    region: singapore           # closest to Bangladesh; options: oregon, frankfurt, singapore
    branch: main

    # Environment variables — set the real values in the Render dashboard.
    # NEVER commit actual secrets to this file.
    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 5001

      - key: DATABASE_URL
        sync: false             # marks it as a secret — enter value in Render UI

      - key: BCRYPT_SALT_ROUNDS
        value: "12"

      - key: JWT_SECRET
        sync: false

      - key: JWT_EXPIRE_IN
        value: 1d

      - key: JWT_REFRESH_SECRET
        sync: false

      - key: JWT_REFRESH_EXPIRE_IN
        value: 365d

      - key: IP_ADDRESS
        value: "0.0.0.0"

      - key: CORS_ORIGIN
        sync: false             # set to your frontend URL, e.g. https://your-app.vercel.app

      - key: EMAIL_FROM
        sync: false

      - key: EMAIL_USER
        sync: false

      - key: EMAIL_HOST
        sync: false

      - key: EMAIL_PORT
        value: "587"

      - key: EMAIL_PASS
        sync: false

      - key: SUPER_ADMIN_EMAIL
        sync: false

      - key: SUPER_ADMIN_PASSWORD
        sync: false

    # Health check path — matches our GET / route in app.ts
    healthCheckPath: /
