# docker-compose.prod.yml — AWS PRODUCTION
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#        OR simply: make deploy   (uses the Makefile shortcut)
#
# Architecture:
#   Internet → Nginx (port 80) → backend (port 5001) / frontend (port 3000)
#
# All services are on an internal network — only Nginx is exposed publicly.

services:

  backend:
    restart: always
    # Don't expose backend port directly in production — go through Nginx
    ports: !reset []
    environment:
      - NODE_ENV=production

  frontend:
    restart: always
    # Don't expose frontend port directly in production — go through Nginx
    ports: !reset []
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:1.27-alpine
    container_name: asm-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - asm-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
