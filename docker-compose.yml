# docker-compose.yml — LOCAL DEVELOPMENT
# Usage: docker compose up --build
#
# Services run directly on their ports (no Nginx) so you can hit them directly:
#   Frontend: http://localhost:3000
#   Backend:  http://localhost:5001

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asm-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    volumes:
      # Persist uploaded files across container restarts
      - uploads_data:/app/uploads
    networks:
      - asm-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the Next.js static output at build time
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5001}
    container_name: asm-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - asm-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  uploads_data:
    driver: local

networks:
  asm-network:
    driver: bridge
